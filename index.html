<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ESEA N°1 - Escáner QR</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #0a0a0f;
      --accent: #00ff88;
      --danger: #ff4466;
      --text: #e8e8f0;
      --muted: #555566;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Inicio ── */
    #screen-start {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 32px;
      text-align: center;
      animation: fadeIn .5s ease;
    }

    .logo {
      width: 80px; height: 80px;
      border: 3px solid var(--accent);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(0,255,136,.25);
    }
    .logo svg { width: 44px; height: 44px; }

    h1 { font-size: 1.3rem; font-weight: 800; line-height: 1.3; }
    h1 span { color: var(--accent); }
    p  { color: var(--muted); font-size: .88rem; line-height: 1.5; max-width: 260px; }

    .btn {
      background: var(--accent); color: #000;
      border: none; padding: 16px 40px; border-radius: 50px;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 0 20px rgba(0,255,136,.3);
      transition: transform .15s;
    }
    .btn:active { transform: scale(.96); }

    /* ── Cámara ── */
    #screen-camera {
      display: none;
      width: 100%; height: 100dvh;
      position: relative;
      flex-direction: column;
      align-items: center; justify-content: center;
    }

    #video {
      width: 100%; height: 100%;
      object-fit: cover;
      position: absolute; inset: 0;
    }

    .frame {
      position: absolute;
      width: 240px; height: 240px;
      z-index: 2;
    }
    .frame::before, .frame::after,
    .frame-inner::before, .frame-inner::after {
      content: '';
      position: absolute;
      width: 40px; height: 40px;
      border-color: var(--accent); border-style: solid;
    }
    .frame::before  { top:0;    left:0;  border-width:3px 0 0 3px; border-radius:6px 0 0 0; }
    .frame::after   { top:0;    right:0; border-width:3px 3px 0 0; border-radius:0 6px 0 0; }
    .frame-inner::before { bottom:0; left:0;  border-width:0 0 3px 3px; border-radius:0 0 0 6px; }
    .frame-inner::after  { bottom:0; right:0; border-width:0 3px 3px 0; border-radius:0 0 6px 0; }

    .scan-line {
      position: absolute;
      width: 210px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 3;
      animation: scan 2s ease-in-out infinite;
      box-shadow: 0 0 8px var(--accent);
    }
    @keyframes scan {
      0%   { transform: translateY(-100px); opacity:0; }
      10%  { opacity:1; }
      90%  { opacity:1; }
      100% { transform: translateY(100px); opacity:0; }
    }

    .hint {
      position: absolute; bottom: 60px;
      color: rgba(255,255,255,.45); font-size:.8rem;
      z-index:3; letter-spacing:1px;
    }

    .btn-cancel {
      position: absolute; top:24px; left:24px; z-index:10;
      background: rgba(0,0,0,.5); border:1px solid rgba(255,255,255,.15);
      color:#fff; padding:8px 18px; border-radius:50px;
      font-family:'Syne',sans-serif; font-size:.8rem; cursor:pointer;
      backdrop-filter: blur(6px);
    }

    #status-bar {
      position: absolute; bottom: 110px;
      background: rgba(0,0,0,.6); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.7); font-size:.75rem;
      padding: 6px 16px; border-radius: 50px; z-index:4;
    }

    /* ── Resultado ── */
    #screen-result {
      display: none;
      flex-direction: column;
      align-items: center; gap:24px;
      padding:40px 32px; text-align:center;
      animation: fadeIn .4s ease;
    }

    .result-icon {
      width:100px; height:100px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:3rem;
    }
    .result-icon.ok  { background:rgba(0,255,136,.12); border:3px solid var(--accent); box-shadow:0 0 40px rgba(0,255,136,.3); animation:pulse 1.5s ease infinite; }
    .result-icon.err { background:rgba(255,68,102,.12); border:3px solid var(--danger);  box-shadow:0 0 40px rgba(255,68,102,.3); }

    @keyframes pulse {
      0%,100% { box-shadow:0 0 30px rgba(0,255,136,.3); }
      50%      { box-shadow:0 0 60px rgba(0,255,136,.5); }
    }

    .result-title { font-size:1.9rem; font-weight:800; }
    .result-title.ok  { color:var(--accent); }
    .result-title.err { color:var(--danger); }
    .result-sub { color:var(--muted); font-size:.88rem; line-height:1.5; max-width:270px; }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Inicio -->
  <div id="screen-start">
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4"  y="4"  width="16" height="16" rx="2" stroke="#00ff88" stroke-width="2.5"/>
        <rect x="28" y="4"  width="16" height="16" rx="2" stroke="#00ff88" stroke-width="2.5"/>
        <rect x="4"  y="28" width="16" height="16" rx="2" stroke="#00ff88" stroke-width="2.5"/>
        <rect x="8"  y="8"  width="8"  height="8"  rx="1" fill="#00ff88"/>
        <rect x="32" y="8"  width="8"  height="8"  rx="1" fill="#00ff88"/>
        <rect x="8"  y="32" width="8"  height="8"  rx="1" fill="#00ff88"/>
        <path d="M28 28h4v4h-4zM36 28h4v4h-4zM28 36h4v4h-4zM36 36h4v4h-4z" fill="#00ff88"/>
        <path d="M32 32h4v4h-4z" fill="#00ccff"/>
      </svg>
    </div>
    <h1>Escuela Secundaria Especializada en Arte <span>N° 1</span></h1>
    <p>Apuntá la cámara al código QR autorizado para verificar el acceso.</p>
    <button class="btn" onclick="iniciarEscaner()">Abrir cámara</button>
  </div>

  <!-- Cámara -->
  <div id="screen-camera">
    <video id="video" autoplay playsinline muted></video>
    <div class="frame"><div class="frame-inner"></div></div>
    <div class="scan-line"></div>
    <p class="hint">Enfocá el QR dentro del marco</p>
    <div id="status-bar">Iniciando cámara...</div>
    <button class="btn-cancel" onclick="detener()">✕ Cancelar</button>
  </div>

  <!-- Resultado -->
  <div id="screen-result">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub"  id="result-sub"></div>
    <button class="btn" onclick="reiniciar()">Escanear de nuevo</button>
  </div>

  <!-- ZXing (mejor lectura en mobile) -->
  <script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>
  <script>
    const URL_VALIDA = "https://www.instagram.com/esea1riestra/";

    const video     = document.getElementById("video");
    const statusBar = document.getElementById("status-bar");
    let codeReader  = null;

    function mostrar(id) {
      ["screen-start","screen-camera","screen-result"].forEach(s => {
        document.getElementById(s).style.display = (s === id) ? "flex" : "none";
      });
    }

    async function iniciarEscaner() {
      mostrar("screen-camera");
      statusBar.textContent = "Iniciando cámara...";

      try {
        codeReader = new ZXing.BrowserMultiFormatReader();

        const devices = await ZXing.BrowserCodeReader.listVideoInputDevices();
        // Preferir cámara trasera
        const device = devices.find(d =>
          d.label.toLowerCase().includes("back") ||
          d.label.toLowerCase().includes("rear") ||
          d.label.toLowerCase().includes("environment")
        ) || devices[devices.length - 1];

        statusBar.textContent = "Buscando QR...";

        await codeReader.decodeFromVideoDevice(
          device ? device.deviceId : undefined,
          video,
          (result, err) => {
            if (result) {
              procesarResultado(result.getText());
            }
          }
        );
      } catch (e) {
        statusBar.textContent = "Error: " + e.message;
        console.error(e);
      }
    }

    function procesarResultado(data) {
      if (codeReader) { codeReader.reset(); codeReader = null; }

      const esValido = data.trim() === URL_VALIDA.trim();

      document.getElementById("result-icon").className   = "result-icon " + (esValido ? "ok" : "err");
      document.getElementById("result-icon").textContent = esValido ? "✓" : "✕";
      document.getElementById("result-title").className  = "result-title " + (esValido ? "ok" : "err");
      document.getElementById("result-title").textContent = esValido ? "Acceso concedido" : "QR no válido";
      document.getElementById("result-sub").textContent  = esValido
        ? "Código verificado correctamente."
        : "Este código QR no está autorizado.";

      mostrar("screen-result");
    }

    function detener() {
      if (codeReader) { codeReader.reset(); codeReader = null; }
      mostrar("screen-start");
    }

    function reiniciar() {
      mostrar("screen-start");
    }
  </script>
</body>
</html>
