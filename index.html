<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>ESEA N°1 - Escáner QR</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #0a0a0f;
      --accent: #00ff88;
      --danger: #ff4466;
      --text: #e8e8f0;
      --muted: #555566;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ── Inicio ── */
    #screen-start {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 32px;
      text-align: center;
      animation: fadeIn .5s ease;
    }

    .logo {
      width: 80px; height: 80px;
      border: 3px solid var(--accent);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(0,255,136,.25);
    }
    .logo svg { width: 44px; height: 44px; }

    h1 { font-size: 1.3rem; font-weight: 800; line-height: 1.3; }
    h1 span { color: var(--accent); }
    p { color: var(--muted); font-size: .88rem; line-height: 1.5; max-width: 260px; }

    .btn {
      background: var(--accent); color: #000;
      border: none; padding: 16px 40px; border-radius: 50px;
      font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 0 20px rgba(0,255,136,.3);
      transition: transform .15s;
    }
    .btn:active { transform: scale(.96); }

    /* ── Cámara ── */
    #screen-camera {
      display: none;
      width: 100%;
      min-height: 100dvh;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 60px;
      gap: 16px;
      position: relative;
    }

    #reader {
      width: 280px;
      border-radius: 16px;
      overflow: hidden;
    }

    /* Ocultar UI por defecto de html5-qrcode */
    #reader__dashboard { display: none !important; }
    #reader__scan_region img { display: none !important; }

    .cam-title {
      font-size: .85rem;
      color: var(--muted);
      letter-spacing: 1px;
      margin-top: 8px;
    }

    .btn-cancel {
      position: absolute; top: 16px; left: 16px;
      background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.15);
      color: #fff; padding: 8px 18px; border-radius: 50px;
      font-family: 'Syne', sans-serif; font-size: .8rem; cursor: pointer;
      backdrop-filter: blur(6px);
    }

    #scan-status {
      font-size: .8rem;
      color: var(--accent);
      letter-spacing: 1px;
      animation: blink 1.2s ease infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; } 50% { opacity:.3; }
    }

    /* ── Resultado ── */
    #screen-result {
      display: none;
      flex-direction: column;
      align-items: center; gap: 24px;
      padding: 40px 32px; text-align: center;
      animation: fadeIn .4s ease;
    }

    .result-icon {
      width: 100px; height: 100px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem;
    }
    .result-icon.ok  { background: rgba(0,255,136,.12); border: 3px solid var(--accent); animation: pulse 1.5s ease infinite; }
    .result-icon.err { background: rgba(255,68,102,.12); border: 3px solid var(--danger); }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 30px rgba(0,255,136,.3); }
      50%      { box-shadow: 0 0 60px rgba(0,255,136,.5); }
    }

    .result-title { font-size: 1.9rem; font-weight: 800; }
    .result-title.ok  { color: var(--accent); }
    .result-title.err { color: var(--danger); }
    .result-sub { color: var(--muted); font-size: .88rem; line-height: 1.5; max-width: 270px; }

    @keyframes fadeIn {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Inicio -->
  <div id="screen-start">
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4"  y="4"  width="16" height="16" rx="2" stroke="#00ff88" stroke-width="2.5"/>
        <rect x="28" y="4"  width="16" height="16" rx="2" stroke="#00ff88" stroke-width="2.5"/>
        <rect x="4"  y="28" width="16" height="16" rx="2" stroke="#00ff88" stroke-width="2.5"/>
        <rect x="8"  y="8"  width="8"  height="8"  rx="1" fill="#00ff88"/>
        <rect x="32" y="8"  width="8"  height="8"  rx="1" fill="#00ff88"/>
        <rect x="8"  y="32" width="8"  height="8"  rx="1" fill="#00ff88"/>
        <path d="M28 28h4v4h-4zM36 28h4v4h-4zM28 36h4v4h-4zM36 36h4v4h-4z" fill="#00ff88"/>
        <path d="M32 32h4v4h-4z" fill="#00ccff"/>
      </svg>
    </div>
    <h1>Escuela Secundaria Especializada en Arte <span>N° 1</span></h1>
    <p>Apuntá la cámara al código QR para verificar el acceso.</p>
    <button class="btn" onclick="iniciarEscaner()">Abrir cámara</button>
  </div>

  <!-- Cámara -->
  <div id="screen-camera">
    <button class="btn-cancel" onclick="detener()">✕ Cancelar</button>
    <div id="reader"></div>
    <p class="cam-title">Escuela Secundaria Especializada en Arte N° 1</p>
    <p id="scan-status">● Escaneando...</p>
  </div>

  <!-- Resultado -->
  <div id="screen-result">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub"  id="result-sub"></div>
    <button class="btn" onclick="reiniciar()">Escanear de nuevo</button>
  </div>

  <script>
    const URL_VALIDA = "https://www.instagram.com/esea1riestra/";
    let html5QrCode = null;

    function mostrar(id) {
      ["screen-start","screen-camera","screen-result"].forEach(s => {
        document.getElementById(s).style.display = (s === id) ? "flex" : "none";
      });
    }

    function iniciarEscaner() {
      mostrar("screen-camera");

      html5QrCode = new Html5Qrcode("reader");

      const config = {
        fps: 15,
        qrbox: { width: 240, height: 240 },
        aspectRatio: 1.0,
        experimentalFeatures: { useBarCodeDetectorIfSupported: true }
      };

      html5QrCode.start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
          // Éxito: parar y mostrar resultado
          html5QrCode.stop().then(() => {
            procesarResultado(decodedText);
          }).catch(() => {
            procesarResultado(decodedText);
          });
        },
        () => {} // Error silencioso (frame sin QR)
      ).catch((err) => {
        alert("No se pudo acceder a la cámara:\n" + err);
        mostrar("screen-start");
      });
    }

    function procesarResultado(data) {
      const esValido = data.trim() === URL_VALIDA.trim();

      document.getElementById("result-icon").className   = "result-icon " + (esValido ? "ok" : "err");
      document.getElementById("result-icon").textContent = esValido ? "✓" : "✕";
      document.getElementById("result-title").className  = "result-title " + (esValido ? "ok" : "err");
      document.getElementById("result-title").textContent = esValido ? "Acceso concedido" : "QR no válido";
      document.getElementById("result-sub").textContent  = esValido
        ? "Código verificado correctamente."
        : "Este código QR no está autorizado.";

      mostrar("screen-result");
    }

    function detener() {
      if (html5QrCode) {
        html5QrCode.stop().catch(() => {}).finally(() => {
          html5QrCode = null;
          mostrar("screen-start");
        });
      } else {
        mostrar("screen-start");
      }
    }

    function reiniciar() {
      mostrar("screen-start");
    }
  </script>
</body>
</html>
