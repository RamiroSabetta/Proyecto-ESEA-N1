<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Escáner QR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap');

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --accent: #00ff88;
      --accent2: #00ccff;
      --danger: #ff4466;
      --text: #e8e8f0;
      --muted: #555566;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    /* ── Pantalla de inicio ── */
    #screen-start {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 32px;
      text-align: center;
      animation: fadeIn .5s ease;
    }

    .logo {
      width: 80px;
      height: 80px;
      border: 3px solid var(--accent);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px rgba(0,255,136,.25);
    }
    .logo svg { width: 44px; height: 44px; }

    h1 { font-size: 1.6rem; font-weight: 800; letter-spacing: -.5px; }
    h1 span { color: var(--accent); }

    p { color: var(--muted); font-size: .9rem; line-height: 1.5; max-width: 260px; }

    .btn {
      background: var(--accent);
      color: #000;
      border: none;
      padding: 16px 40px;
      border-radius: 50px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .5px;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 0 20px rgba(0,255,136,.3);
    }
    .btn:active { transform: scale(.96); }

    /* ── Pantalla de cámara ── */
    #screen-camera {
      display: none;
      width: 100%;
      height: 100dvh;
      position: relative;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      inset: 0;
    }

    canvas { display: none; }

    /* Marco de escaneo */
    .frame {
      position: absolute;
      width: 220px;
      height: 220px;
      z-index: 2;
    }
    .frame::before, .frame::after,
    .frame-inner::before, .frame-inner::after {
      content: '';
      position: absolute;
      width: 36px;
      height: 36px;
      border-color: var(--accent);
      border-style: solid;
    }
    .frame::before  { top: 0;    left: 0;  border-width: 3px 0 0 3px; border-radius: 6px 0 0 0; }
    .frame::after   { top: 0;    right: 0; border-width: 3px 3px 0 0; border-radius: 0 6px 0 0; }
    .frame-inner::before { bottom: 0; left: 0;  border-width: 0 0 3px 3px; border-radius: 0 0 0 6px; }
    .frame-inner::after  { bottom: 0; right: 0; border-width: 0 3px 3px 0; border-radius: 0 0 6px 0; }

    /* Línea de escaneo */
    .scan-line {
      position: absolute;
      width: 200px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      z-index: 3;
      animation: scan 2s ease-in-out infinite;
      box-shadow: 0 0 8px var(--accent);
    }
    @keyframes scan {
      0%   { transform: translateY(-90px); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { transform: translateY(90px); opacity: 0; }
    }

    .hint {
      position: absolute;
      bottom: 60px;
      color: rgba(255,255,255,.5);
      font-size: .8rem;
      z-index: 3;
      letter-spacing: 1px;
    }

    .btn-cancel {
      position: absolute;
      top: 24px;
      left: 24px;
      z-index: 10;
      background: rgba(0,0,0,.5);
      border: 1px solid rgba(255,255,255,.15);
      color: #fff;
      padding: 8px 18px;
      border-radius: 50px;
      font-family: 'Syne', sans-serif;
      font-size: .8rem;
      cursor: pointer;
      backdrop-filter: blur(6px);
    }

    /* ── Pantalla de resultado ── */
    #screen-result {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 32px;
      text-align: center;
      animation: fadeIn .4s ease;
    }

    .result-icon {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
    }
    .result-icon.ok  { background: rgba(0,255,136,.12); border: 3px solid var(--accent); box-shadow: 0 0 40px rgba(0,255,136,.3); animation: pulse 1.5s ease infinite; }
    .result-icon.err { background: rgba(255,68,102,.12); border: 3px solid var(--danger);  box-shadow: 0 0 40px rgba(255,68,102,.3); }

    @keyframes pulse {
      0%,100% { box-shadow: 0 0 30px rgba(0,255,136,.3); }
      50%      { box-shadow: 0 0 60px rgba(0,255,136,.5); }
    }

    .result-title {
      font-size: 2rem;
      font-weight: 800;
    }
    .result-title.ok  { color: var(--accent); }
    .result-title.err { color: var(--danger); }

    .result-sub {
      color: var(--muted);
      font-size: .88rem;
      line-height: 1.5;
      max-width: 270px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Pantalla de inicio -->
  <div id="screen-start">
    <div class="logo">
      <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="4"  y="4"  width="16" height="16" rx="2" stroke="#00ff88" stroke-width="2.5"/>
        <rect x="28" y="4"  width="16" height="16" rx="2" stroke="#00ff88" stroke-width="2.5"/>
        <rect x="4"  y="28" width="16" height="16" rx="2" stroke="#00ff88" stroke-width="2.5"/>
        <rect x="8"  y="8"  width="8"  height="8"  rx="1" fill="#00ff88"/>
        <rect x="32" y="8"  width="8"  height="8"  rx="1" fill="#00ff88"/>
        <rect x="8"  y="32" width="8"  height="8"  rx="1" fill="#00ff88"/>
        <path d="M28 28h4v4h-4zM36 28h4v4h-4zM28 36h4v4h-4zM36 36h4v4h-4z" fill="#00ff88"/>
        <path d="M32 32h4v4h-4z" fill="#00ccff"/>
      </svg>
    </div>
    <div>
      <h1>Escuela Secundaria Especializada en Arte <span>N° 1</span></h1>
    </div>
    <p>Apuntá la cámara al código QR autorizado para verificar el acceso.</p>
    <button class="btn" onclick="iniciarEscaner()">Abrir cámara</button>
  </div>

  <!-- Pantalla de cámara -->
  <div id="screen-camera">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
    <div class="frame"><div class="frame-inner"></div></div>
    <div class="scan-line"></div>
    <p class="hint">Enfocá el QR dentro del marco</p>
    <button class="btn-cancel" onclick="detener()">✕ Cancelar</button>
  </div>

  <!-- Pantalla de resultado -->
  <div id="screen-result">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-title" id="result-title"></div>
    <div class="result-sub"  id="result-sub"></div>
    <button class="btn" onclick="reiniciar()">Escanear de nuevo</button>
  </div>

  <script>
    // ─── Configuración ──────────────────────────────────────────────────────────
    const QR_AUTORIZADO = "images/qr_instagram.png"; // ruta de tu QR
    const URL_VALIDA    = "https://www.instagram.com/esea1riestra/";
    // ────────────────────────────────────────────────────────────────────────────

    const video   = document.getElementById("video");
    const canvas  = document.getElementById("canvas");
    const ctx     = canvas.getContext("2d", { willReadFrequently: true });
    let stream    = null;
    let animFrame = null;
    let escaneando = true;

    function mostrar(id) {
      ["screen-start","screen-camera","screen-result"].forEach(s => {
        const el = document.getElementById(s);
        el.style.display = (s === id) ? "flex" : "none";
      });
    }

    async function iniciarEscaner() {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }
        });
        video.srcObject = stream;
        await video.play();
        mostrar("screen-camera");
        escaneando = true;
        requestAnimationFrame(tick);
      } catch (e) {
        alert("No se pudo acceder a la cámara.\n" + e.message);
      }
    }

    function tick() {
      if (!escaneando) return;
      if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvas.width  = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0);
        const img  = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
        if (code) {
          escaneando = false;
          procesarResultado(code.data);
          return;
        }
      }
      animFrame = requestAnimationFrame(tick);
    }

    function procesarResultado(data) {
      detenerStream();
      const esValido = data.trim() === URL_VALIDA.trim();

      document.getElementById("result-icon").className  = "result-icon " + (esValido ? "ok" : "err");
      document.getElementById("result-icon").textContent = esValido ? "✓" : "✕";
      document.getElementById("result-title").className  = "result-title " + (esValido ? "ok" : "err");
      document.getElementById("result-title").textContent = esValido ? "Acceso concedido" : "QR no válido";
      document.getElementById("result-sub").textContent   = esValido
        ? "Código verificado correctamente."
        : "Este QR no está autorizado.";

      mostrar("screen-result");
    }

    function detenerStream() {
      if (animFrame) cancelAnimationFrame(animFrame);
      if (stream) stream.getTracks().forEach(t => t.stop());
      stream = null;
    }

    function detener() {
      detenerStream();
      escaneando = false;
      mostrar("screen-start");
    }

    function reiniciar() {
      mostrar("screen-start");
    }
  </script>
</body>
</html>
